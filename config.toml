# The URL the site will be built for
base_url = "https://iagobozza.com"
title = "Iago Bozza"

theme = "terminimal"

compile_sass = true
generate_feeds = true
feed_filenames = ["rss.xml", "atom.xml"]
build_search_index = true

taxonomies = [
    {name = "tags"}
]

[markdown.highlighting]
theme = "github-dark"

[extra]

logo_text = "Iago Bozza"
author = "Iago Bozza"
copyright_html = " "

accent_color = "red-auto"
background_color = "auto"

page_titles = "combined"

menu_items = [
    {name = "portfolio", url = "$BASE_URL/portfolio"},
    {name = "blog", url = "$BASE_URL/blog"},
    {name = "about", url = "$BASE_URL/about"},
    {name = "github", url = "https://github.com/writeonlycode/", newtab = true},
]
